spring:
  application:
    name: studybuddy
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: embedded
    timeout: 30m

logging:
  level:
    com:
      tcyao:
        studybuddy:
          filters: INFO

server:
  port: 8000